<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Audit Report</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --c-bg:#f7f7f5;--c-white:#fff;--c-border:#e4e4e0;--c-text:#1a1a1a;--c-muted:#6b6b6b;
    --c-poor:#b91c1c;--c-mediocre:#c2410c;--c-fair:#d97706;--c-decent:#ca8a04;--c-good:#4d7c0f;
    --c-violation-high:#b91c1c;--c-violation-low:#c2410c;--c-neutral:#6b7280;
    --c-adhered-low:#4d7c0f;--c-adhered-high:#15803d;
    --c-accent:#7c3aed;--c-accent-bg:#ede9fe;
    --sidebar:300px;--detail:480px;
  }
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--c-text);background:var(--c-bg)}

  /* ── TOP BAR ── */
  .topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:52px;background:var(--c-white);border-bottom:1px solid var(--c-border);position:sticky;top:0;z-index:100}
  .topbar-logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--c-text)}
  .topbar-site{font-size:13px;color:var(--c-muted);margin-left:4px}
  .topbar-date{font-size:12px;color:var(--c-muted);margin-left:auto}
  .btn-export{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--c-text);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
  .btn-export:hover{opacity:.85}

  /* ── SECTION TABS ── */
  .tabs{display:flex;align-items:center;gap:0;padding:0 24px;background:var(--c-white);border-bottom:1px solid var(--c-border);overflow-x:auto}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--c-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
  .tab:hover{color:var(--c-text)}
  .tab.active{color:var(--c-text);border-bottom-color:var(--c-text)}
  .tab-score{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:99px;font-size:11px;font-weight:600}
  .tab-score.poor{background:#fee2e2;color:var(--c-poor)}
  .tab-score.mediocre{background:#ffedd5;color:var(--c-mediocre)}
  .tab-score.decent{background:#fef9c3;color:var(--c-decent)}
  .tab-score.good{background:#dcfce7;color:var(--c-good)}

  /* ── PAGES ── */
  .page{display:none}.page.active{display:block}

  /* ══════════════════════════════════════
     OVERVIEW PAGE
  ══════════════════════════════════════ */
  .overview{max-width:1100px;margin:0 auto;padding:40px 24px}
  .overview-title{font-size:26px;font-weight:700;margin-bottom:4px}
  .overview-title span{color:var(--c-muted);font-weight:400}
  .overview-meta{font-size:13px;color:var(--c-muted);margin-bottom:32px}

  .scale-header{display:grid;grid-template-columns:260px 1fr;gap:16px;margin-bottom:8px}
  .scale-labels{display:flex;justify-content:space-between;padding:0 4px;font-size:11px;font-weight:600;color:var(--c-muted);letter-spacing:.5px;text-transform:uppercase}

  .scorecard-section{background:var(--c-white);border:1px solid var(--c-border);border-radius:10px;overflow:hidden;margin-bottom:24px}
  .scorecard-row{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--c-border)}
  .scorecard-row:last-child{border-bottom:none}
  .scorecard-row.section-header{background:#fafafa;padding:20px 20px 16px}
  .scorecard-label{font-size:14px;font-weight:600}
  .scorecard-label.parent{font-size:16px}
  .scorecard-sublabel{font-size:12px;color:var(--c-muted);margin-top:2px}
  .scorecard-bar-wrap{position:relative}

  .bar-track{position:relative;height:14px;background:#f0f0ee;border-radius:7px;overflow:visible}
  .bar-fill{height:100%;border-radius:7px;transition:width .5s ease}
  .bar-fill.poor{background:linear-gradient(90deg,#b91c1c,#dc2626)}
  .bar-fill.mediocre{background:linear-gradient(90deg,#c2410c,#ea580c)}
  .bar-fill.fair{background:linear-gradient(90deg,#d97706,#f59e0b)}
  .bar-fill.decent{background:linear-gradient(90deg,#ca8a04,#eab308)}
  .bar-fill.good{background:linear-gradient(90deg,#4d7c0f,#65a30d)}
  .bar-marker{position:absolute;top:-4px;width:3px;height:22px;background:#1a1a1a;border-radius:2px;transform:translateX(-50%)}
  .bar-score{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--c-muted);white-space:nowrap;padding-left:8px}

  .dots-row{display:flex;align-items:center;height:16px;margin-top:6px}
  .dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;position:relative;flex-shrink:0}

  /* Executive Summary */
  .exec-summary{background:var(--c-white);border:1px solid var(--c-border);border-radius:10px;padding:28px;margin-bottom:24px}
  .exec-summary h3{font-size:16px;font-weight:700;margin-bottom:12px}
  .exec-summary p{font-size:14px;line-height:1.7;color:#374151;margin-bottom:12px}
  .top-violations{margin-top:20px}
  .top-violations h4{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--c-muted);margin-bottom:12px}
  .violation-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--c-border)}
  .vi-rank{width:24px;height:24px;border-radius:50%;background:#fee2e2;color:var(--c-poor);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .vi-body{flex:1}
  .vi-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .vi-meta{font-size:12px;color:var(--c-muted)}
  .vi-score{font-size:13px;font-weight:700;color:var(--c-poor);white-space:nowrap;margin-left:auto;padding-left:12px}

  /* ══════════════════════════════════════
     SECTION PAGE (3-column)
  ══════════════════════════════════════ */
  .section-page{display:none;height:calc(100vh - 104px)}
  .section-page.active{display:grid;grid-template-columns:var(--sidebar) 1fr}

  /* Sidebar */
  .sidebar{border-right:1px solid var(--c-border);overflow-y:auto;background:var(--c-white)}
  .sidebar-header{padding:16px;border-bottom:1px solid var(--c-border)}
  .sidebar-section-name{font-size:15px;font-weight:700}
  .sidebar-count{font-size:12px;color:var(--c-muted);margin-top:2px}
  .sidebar-group{padding:8px 0}
  .sidebar-group-label{padding:8px 16px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--c-muted);display:flex;align-items:center;justify-content:space-between}
  .sidebar-group-label svg{opacity:.5}

  .guideline-row{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
  .guideline-row:hover{background:#f9f9f7}
  .guideline-row.active{background:#f4f3ff;border-left-color:var(--c-accent)}
  .gr-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .gr-icon.violated-high{background:#fee2e2;color:var(--c-poor)}
  .gr-icon.violated-low{background:#ffedd5;color:var(--c-mediocre)}
  .gr-icon.neutral{background:#f3f4f6;color:var(--c-neutral)}
  .gr-icon.adhered-low{background:#dcfce7;color:var(--c-adhered-low)}
  .gr-icon.adhered-high{background:#dcfce7;color:var(--c-adhered-high)}
  .gr-icon.na{background:#f3f4f6;color:#9ca3af}
  .gr-title{font-size:12.5px;line-height:1.4;flex:1}
  .gr-id{font-size:11px;color:var(--c-muted)}

  /* Detail pane */
  .detail-pane{overflow-y:auto;display:grid;grid-template-columns:1fr var(--detail);background:var(--c-bg)}
  .detail-content{padding:28px;overflow-y:auto}
  .detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--c-muted);font-size:14px;grid-column:1/-1}

  .page-selector{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
  .page-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--c-border);background:var(--c-white);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .page-btn:hover{border-color:#aaa}
  .page-btn.active{background:var(--c-text);color:#fff;border-color:var(--c-text)}

  .detail-card{background:var(--c-white);border:1px solid var(--c-border);border-radius:10px;overflow:hidden}
  .detail-card-head{padding:20px 24px;border-bottom:1px solid var(--c-border)}
  .dc-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .dc-id{font-size:12px;color:var(--c-muted)}
  .dc-badge{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
  .dc-badge.violated-high{background:#fee2e2;color:var(--c-poor)}
  .dc-badge.violated-low{background:#ffedd5;color:var(--c-mediocre)}
  .dc-badge.neutral{background:#f3f4f6;color:var(--c-neutral)}
  .dc-badge.adhered-low{background:#dcfce7;color:var(--c-adhered-low)}
  .dc-badge.adhered-high{background:#dcfce7;color:var(--c-adhered-high)}
  .dc-badge.na{background:#f3f4f6;color:#9ca3af}
  .dc-impact{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;background:#f3f4f6;color:var(--c-muted)}
  .dc-score{font-size:13px;font-weight:700}
  .dc-score.negative{color:var(--c-poor)}
  .dc-score.positive{color:var(--c-good)}
  .dc-title{font-size:16px;font-weight:700;line-height:1.4}

  .detail-card-body{padding:20px 24px}
  .dc-section{margin-bottom:20px}
  .dc-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--c-muted);margin-bottom:8px}
  .dc-impl-item{display:flex;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.5}
  .dc-impl-item::before{content:'•';color:var(--c-muted);flex-shrink:0}
  .dc-screenshot{width:100%;border-radius:8px;border:1px solid var(--c-border);cursor:pointer;transition:opacity .15s;max-height:220px;object-fit:cover;object-position:top}
  .dc-screenshot:hover{opacity:.9}
  .dc-no-screenshot{padding:24px;background:#f9f9f7;border-radius:8px;border:1px dashed var(--c-border);text-align:center;color:var(--c-muted);font-size:13px}
  .dc-fix{font-size:13px;line-height:1.7;color:#374151;padding:14px;background:#f0fdf4;border-radius:8px;border-left:3px solid #16a34a}
  .dc-fix-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#16a34a;margin-bottom:6px}

  .detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#f3f4f6;color:var(--c-muted)}
  .tag.yes{background:#dcfce7;color:#166534}

  /* Preview pane */
  .preview-pane{border-left:1px solid var(--c-border);background:var(--c-white);display:flex;flex-direction:column}
  .preview-header{padding:12px 16px;border-bottom:1px solid var(--c-border);font-size:12px;font-weight:600;color:var(--c-muted)}
  .preview-img{flex:1;overflow:hidden}
  .preview-img img{width:100%;height:100%;object-fit:cover;object-position:top}
  .preview-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--c-muted);font-size:13px}

  /* ── MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:24px}
  .modal-overlay.open{display:flex}
  .modal-img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 24px 48px rgba(0,0,0,.4)}
  .modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}

  /* ── RESPONSIVE adjustments ── */
  @media(max-width:900px){
    .section-page.active{grid-template-columns:var(--sidebar) 1fr}
    .detail-pane{grid-template-columns:1fr}
    .preview-pane{display:none}
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo" id="topbar-sitename">Site</div>
  <div class="topbar-site" id="topbar-url"></div>
  <div class="topbar-date" id="topbar-date"></div>
  <button class="btn-export" onclick="exportCSV()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export CSV
  </button>
</div>

<!-- SECTION TABS -->
<div class="tabs" id="main-tabs"></div>

<!-- ══ OVERVIEW PAGE ══ -->
<div class="page active" id="page-overview">
  <div class="overview">
    <div class="overview-title"><span id="ov-sitename"></span>'s UX Performance</div>
    <div class="overview-meta" id="ov-meta"></div>

    <!-- Executive Summary -->
    <div class="exec-summary">
      <h3>Executive Summary</h3>
      <p id="ov-summary-text"></p>
      <div class="top-violations">
        <h4>Top Priority Fixes</h4>
        <div id="ov-top-violations"></div>
      </div>
    </div>

    <!-- Scorecard -->
    <div class="scale-header">
      <div></div>
      <div>
        <div class="scale-labels" id="scale-labels">
          <span>POOR</span><span>MEDIOCRE</span><span>DECENT</span><span>GOOD</span><span>PERFECT</span>
        </div>
      </div>
    </div>
    <div class="scorecard-section" id="scorecard"></div>
  </div>
</div>

<!-- Section pages injected by JS -->
<div id="section-pages"></div>

<!-- Screenshot modal -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img class="modal-img" id="modal-img" src="" alt="">
</div>

<script>
// ═══════════════════════════════════════════════
//  AUDIT DATA — Claude replaces this object with
//  actual findings after completing the audit.
// ═══════════════════════════════════════════════
const AUDIT_DATA = {

    {

      theme: "homepage", topic: "Desktop Web > Site-Wide Elements > Header",
      platform: "Desktop", isLowCost: true, isMissedOpportunity: false, isSuggestion: false,

      judgement: "Violated High", impact: "Disruptive", impactScore: -2.0,
      implementation: [
        "No order tracking link is present in the sitewide header or footer navigation",

    {

//  APP LOGIC
// ═══════════════════════════════════════════════

let activeTheme = 'overview';
let activeGuideline = null;

function scoreClass(score) {
  if (score === null || score === undefined) return 'na';
  if (score < 5) return 'poor';
  if (score < 20) return 'mediocre';
  if (score < 40) return 'fair';
  if (score < 60) return 'decent';
  return 'good';
}

function judgementClass(j) {
  const map = {
    'Violated High': 'violated-high',
    'Violated Low': 'violated-low',
    'Neutral': 'neutral',
    'Adhered Low': 'adhered-low',
    'Adhered High': 'adhered-high',
    'Not Applicable': 'na'
  };
  return map[j] || 'na';
}

function judgementIcon(j) {
  if (j === 'Violated High') return '!!';
  if (j === 'Violated Low') return '!';
  if (j === 'Adhered High' || j === 'Adhered Low') return '✓';
  if (j === 'Neutral') return '~';
  return '–';
}

function scoreToBarPct(score) {
  // Map score range -50 to +100 → 0% to 100%
  if (score === null) return 0;
  const min = -50, max = 100;
  return Math.max(0, Math.min(100, ((score - min) / (max - min)) * 100));
}

function init() {
  const d = AUDIT_DATA;
  // Topbar
  document.getElementById('topbar-sitename').textContent = d.site;
  document.getElementById('topbar-url').textContent = '— ' + d.siteType;
  document.getElementById('topbar-date').textContent = d.date + ' · ' + d.auditor;

  // Overview
  document.getElementById('ov-sitename').textContent = d.site;
  document.getElementById('ov-meta').textContent = d.guidelineCount ? d.guidelineCount + ' guidelines assessed · ' + d.scope : d.scope;
  document.getElementById('ov-summary-text').textContent = d.executiveSummary;

  // Top violations
  const topViolations = [...d.assessments]
    .filter(a => a.impactScore < 0)
    .sort((a, b) => a.impactScore - b.impactScore)
    .slice(0, 5);
  const tvEl = document.getElementById('ov-top-violations');
  topViolations.forEach((v, i) => {
    tvEl.innerHTML += `
      <div class="violation-item">
        <div class="vi-rank">${i+1}</div>
        <div class="vi-body">
          <div class="vi-title">${v.title}</div>
          <div class="vi-meta">${v.code} · ${v.topic} · ${v.judgement}</div>
        </div>
        <div class="vi-score">${v.impactScore.toFixed(1)}</div>
      </div>`;
  });

  // Scorecard
  buildScorecard();

  // Tabs
  buildTabs();

  // Section pages
  buildSectionPages();
}

function buildScorecard() {
  const themes = AUDIT_DATA.themes.filter(t => t.id !== 'overview');
  let html = '';
  themes.forEach(t => {
    const pct = scoreToBarPct(t.performance);
    const cls = scoreClass(t.performance);
    const scoreLabel = t.performance === null
      ? '<span style="font-size:12px;color:#9ca3af;font-style:italic">Too few ratings</span>'
      : `<span class="bar-score">${t.performance > 0 ? '+' : ''}${t.performance}</span>`;
    // Simulated benchmark dots
    const dots = generateDots(t.performance);
    html += `
      <div class="scorecard-row">
        <div>
          <div class="scorecard-label">${t.name}</div>
          <div class="scorecard-sublabel">${t.guidelineCount} Guidelines · ${t.violationCount} violations</div>
        </div>
        <div class="scorecard-bar-wrap">
          <div class="bar-track" style="width:calc(100% - 60px)">
            <div class="bar-fill ${cls}" style="width:${pct}%"></div>
            ${t.performance !== null ? `<div class="bar-marker" style="left:${pct}%"></div>` : ''}
          </div>
          ${scoreLabel}
          <div class="dots-row" style="width:calc(100% - 60px)">${dots}</div>
        </div>
      </div>`;
  });
  document.getElementById('scorecard').innerHTML = html;
}

function generateDots(currentScore) {
  // Simulate ~35 benchmark site dots spread across the scale
  const positions = [2,5,8,11,14,17,19,21,23,25,27,29,31,33,35,37,39,41,43,45,47,50,53,56,59,62,65,68,71,74,77,80,85,90,95];
  return positions.map(p => `<div class="dot" style="margin-left:${p * 0.01 * (100/96) * 100}%;position:absolute"></div>`).join('');
}

function buildTabs() {
  const tabs = document.getElementById('main-tabs');
  AUDIT_DATA.themes.forEach(t => {
    const scoreHtml = t.performance !== null && t.id !== 'overview'
      ? `<span class="tab-score ${scoreClass(t.performance)}">${t.performance > 0 ? '+' : ''}${t.performance}</span>` : '';
    const div = document.createElement('div');
    div.className = 'tab' + (t.id === 'overview' ? ' active' : '');
    div.dataset.theme = t.id;
    div.innerHTML = t.name + scoreHtml;
    div.onclick = () => switchTab(t.id);
    tabs.appendChild(div);
  });
}

function switchTab(themeId) {
  activeTheme = themeId;
  activeGuideline = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.theme === themeId));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-overview' && themeId === 'overview'));
  document.querySelectorAll('.section-page').forEach(p => p.classList.toggle('active', p.id === 'section-' + themeId));
}

function buildSectionPages() {
  const container = document.getElementById('section-pages');
  const themes = AUDIT_DATA.themes.filter(t => t.id !== 'overview');
  themes.forEach(t => {
    const assessments = AUDIT_DATA.assessments.filter(a => a.theme === t.id);
    const violated = assessments.filter(a => a.judgement.startsWith('Violated'));
    const adhered = assessments.filter(a => a.judgement.startsWith('Adhered'));
    const neutral = assessments.filter(a => a.judgement === 'Neutral' || a.judgement === 'Not Applicable');

    const page = document.createElement('div');
    page.className = 'section-page';
    page.id = 'section-' + t.id;

    // sidebar
    let sidebarHtml = `<div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-section-name">${t.name}</div>
        <div class="sidebar-count">${assessments.length} of ${t.guidelineCount} Guidelines Assessed</div>
      </div>`;
    if (violated.length) {
      sidebarHtml += `<div class="sidebar-group"><div class="sidebar-group-label">VIOLATIONS (${violated.length})</div>`;
      violated.forEach(a => { sidebarHtml += guidelineRowHtml(a, t.id); });
      sidebarHtml += '</div>';
    }
    if (adhered.length) {
      sidebarHtml += `<div class="sidebar-group"><div class="sidebar-group-label">PASSING (${adhered.length})</div>`;
      adhered.forEach(a => { sidebarHtml += guidelineRowHtml(a, t.id); });
      sidebarHtml += '</div>';
    }
    if (neutral.length) {
      sidebarHtml += `<div class="sidebar-group"><div class="sidebar-group-label">NEUTRAL / N/A (${neutral.length})</div>`;
      neutral.forEach(a => { sidebarHtml += guidelineRowHtml(a, t.id); });
      sidebarHtml += '</div>';
    }
    sidebarHtml += '</div>';

    // detail pane
    const detailHtml = `<div class="detail-pane" id="detail-${t.id}">
      <div class="detail-empty" id="detail-empty-${t.id}">Select a guideline to view details</div>
      <div class="detail-content" id="detail-content-${t.id}" style="display:none"></div>
      <div class="preview-pane" id="preview-${t.id}">
        <div class="preview-header">SITE PREVIEW</div>
        <div class="preview-empty" id="preview-empty-${t.id}">Select a guideline</div>
        <div class="preview-img" id="preview-img-${t.id}" style="display:none"><img id="preview-src-${t.id}" src="" alt=""></div>
      </div>
    </div>`;

    page.innerHTML = sidebarHtml + detailHtml;
    container.appendChild(page);
  });
}

function guidelineRowHtml(a, themeId) {
  const jc = judgementClass(a.judgement);
  const icon = judgementIcon(a.judgement);
  return `<div class="guideline-row" data-code="${a.code}" onclick="selectGuideline('${themeId}','${a.code.replace(/'/g,"\\'")}')">
    <div class="gr-icon ${jc}">${icon}</div>
    <div>
      <div class="gr-title">${a.title}</div>
      <div class="gr-id">${a.code}</div>
    </div>
  </div>`;
}

function selectGuideline(themeId, code) {
  const a = AUDIT_DATA.assessments.find(x => x.theme === themeId && x.code === code);
  if (!a) return;
  activeGuideline = code;

  // Highlight sidebar row
  document.querySelectorAll(`#section-${themeId} .guideline-row`).forEach(r => {
    r.classList.toggle('active', r.dataset.code === code);
  });

  // Hide empty state, show content
  document.getElementById(`detail-empty-${themeId}`).style.display = 'none';
  const content = document.getElementById(`detail-content-${themeId}`);
  content.style.display = 'block';

  const jc = judgementClass(a.judgement);
  const scoreColor = a.impactScore < 0 ? 'negative' : (a.impactScore > 0 ? 'positive' : '');

  // Page context buttons
  const pageContexts = a.pageContexts || ['All Pages'];
  const contextBtns = pageContexts.map((p,i) =>
    `<button class="page-btn${i===0?' active':''}" onclick="selectPageContext(this,'${themeId}','${a.code.replace(/'/g,"\\'")}','${p}')">${p}</button>`
  ).join('');

  // Implementation bullets
  const implHtml = (a.implementation||[]).map(b => `<div class="dc-impl-item">${b}</div>`).join('');

  // Screenshot
  const screenshotHtml = a.screenshot
    ? `<img class="dc-screenshot" src="${a.screenshot}" alt="Screenshot" onclick="openModal('${a.screenshot}')" onerror="this.parentElement.innerHTML='<div class=\\'dc-no-screenshot\\'>Screenshot: ${a.screenshot}</div>'">`
    : `<div class="dc-no-screenshot">No violation screenshot (guideline passed or N/A)</div>`;

  // Tags
  const tagsHtml = `
    <span class="tag ${a.isLowCost?'yes':''}">Low Cost: ${a.isLowCost?'Yes':'No'}</span>
    <span class="tag ${a.isMissedOpportunity?'yes':''}">Missed Opportunity: ${a.isMissedOpportunity?'Yes':'No'}</span>
    <span class="tag ${a.isSuggestion?'yes':''}">Suggestion: ${a.isSuggestion?'Yes':'No'}</span>`;

  content.innerHTML = `
    <div class="page-selector">${contextBtns}</div>
    <div class="detail-card">
      <div class="detail-card-head">
        <div class="dc-meta">
          <span class="dc-id">${a.code}</span>
          <span class="dc-badge ${jc}">${a.judgement}</span>
          <span class="dc-impact">${a.impact}</span>
          <span class="dc-score ${scoreColor}">${a.impactScore > 0 ? '+' : ''}${a.impactScore.toFixed(1)}</span>
        </div>
        <div class="dc-title">${a.title}</div>
        <div class="detail-tags">${tagsHtml}</div>
      </div>
      <div class="detail-card-body">
        <div class="dc-section">
          <div class="dc-section-label">Your Implementation</div>
          ${implHtml}
        </div>
        <div class="dc-section">
          <div class="dc-section-label">Screenshot</div>
          ${screenshotHtml}
        </div>
        ${a.fix ? `<div class="dc-section">
          <div class="dc-fix-label">UX Recommendation</div>
          <div class="dc-fix">${a.fix}</div>
        </div>` : ''}
      </div>
    </div>`;

  // Preview pane
  updatePreview(themeId, a.screenshot);
}

function selectPageContext(btn, themeId, code, context) {
  btn.closest('.page-selector').querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updatePreview(themeId, screenshot) {
  const empty = document.getElementById(`preview-empty-${themeId}`);
  const imgWrap = document.getElementById(`preview-img-${themeId}`);
  const img = document.getElementById(`preview-src-${themeId}`);
  if (screenshot) {
    img.src = screenshot;
    img.onerror = () => { imgWrap.style.display='none'; empty.style.display='flex'; empty.textContent='Screenshot: ' + screenshot; };
    img.onload = () => { empty.style.display='none'; imgWrap.style.display='block'; };
    img.src = screenshot; // trigger load
  } else {
    imgWrap.style.display = 'none';
    empty.style.display = 'flex';
    empty.textContent = 'No screenshot available';
  }
}

function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── CSV EXPORT ──
function exportCSV() {
  const headers = ['Code','Title','Platform','Is Low Cost','Is Missed Opportunity','Is Suggestion','Judgement','Impact','Impact Score','Notes','Topic','Screenshot'];
  const rows = AUDIT_DATA.assessments.map(a => [
    a.code, a.title, a.platform,
    a.isLowCost ? 'Yes' : 'No',
    a.isMissedOpportunity ? 'Yes' : 'No',
    a.isSuggestion ? 'Yes' : 'No',
    a.judgement, a.impact, a.impactScore,
    (a.implementation||[]).join(' · ') + (a.fix ? ' | Fix: ' + a.fix : ''),
    a.topic || '',
    a.screenshot || ''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = AUDIT_DATA.site.replace(/\./g,'_') + '_ux_audit.csv';
  a.click();
}

init();
</script>
